name: Scrape BTC price

on:
  # Run daily at 00:00 UTC (midnight, before any market moves)
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: # manual trigger

# Avoid overlapping runs
concurrency:
  group: btc-price-scrape
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push commits
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run scraper
        run: python scripts/scrape_btc_price.py

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- data/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Files changed:"
            git diff --stat -- data/
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          MSG=$(cat <<'EOF'
            chore(btc): update Bitcoin USD price (blockchain.info)

            Automated daily scrape of blockchain.info/charts/market-price.
            Full history from 2009-01-03 (BTC genesis) → today.
            EOF
          )
          if [ -n "${{ github.event.head_commit.message }}" ]; then
            MSG="$MSG\n\nTriggered by: ${{ github.event_name }} (${{ github.ref }})"
          fi
          git commit -m "$(printf '%b' "$MSG")"
          git push
