name: Scrape coin prices (14 assets)

on:
  schedule:
    # Daily 00:05 UTC (5 min after BTC scrape to avoid simultaneous runs)
    - cron: '5 0 * * *'
  workflow_dispatch:  # manual trigger

concurrency:
  group: coin-prices-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run coin prices scraper
        run: python scripts/scrape_coin_prices.py

      - name: Commit and push updated data
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/*-price.json
          git diff --staged --quiet || git commit -m "chore: update coin price data [skip ci]"
          git push
