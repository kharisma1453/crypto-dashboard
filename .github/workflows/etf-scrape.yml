name: Scrape Farside ETF flows

on:
  # Run weekdays at 16:00 UTC (after US market close ~22:00 WIB / 11:00 EST close + buffer)
  schedule:
    - cron: '0 16 * * 1-5'
  workflow_dispatch: # manual trigger

# Avoid overlapping runs
concurrency:
  group: farside-scrape
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push commits
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scripts/scrape_farside.py') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Playwright + browsers
        run: |
          pip install playwright==1.48.*
          python -m playwright install --with-deps chromium

      - name: Run scraper
        run: python scripts/scrape_farside.py

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- etf-data/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Files changed:"
            git diff --stat -- etf-data/
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add etf-data/
          # Build commit message with summary
          MSG=$(cat <<'EOF'
            chore(etf): update Farside ETF flow data

            Automated daily scrape of farside.co.uk ETF flow tables.
            EOF
          )
          if [ -n "${{ github.event.head_commit.message }}" ]; then
            MSG="$MSG\n\nTriggered by: ${{ github.event_name }} (${{ github.ref }})"
          fi
          git commit -m "$(printf '%b' "$MSG")"
          git push
