<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Crypto Dashboard — Dense Degen</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(180deg, #08080c 0%, #0d0d14 100%);
  }
  .num { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-variant-numeric: tabular-nums; }
  .up { color: #00d68f; }
  .down { color: #ff3b69; }
  .skel { background: #1a1a24; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
  .spark { stroke-width: 2; fill: none; }
  .card { background: rgba(20,20,30,0.7); border: 1px solid #2a2a3a; backdrop-filter: blur(8px); }
  .card:hover { border-color: #4a4a6a; }
  .glow-up { text-shadow: 0 0 12px rgba(0,214,143,0.4); }
  .glow-down { text-shadow: 0 0 12px rgba(255,59,105,0.4); }
  .bar { height: 3px; border-radius: 2px; }
  .accent { background: linear-gradient(90deg, #8b5cf6, #ec4899); }
</style>
</head>
<body class="text-neutral-100 min-h-screen">
<header class="border-b border-neutral-800/50">
  <div class="max-w-7xl mx-auto px-5 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-6 h-1 accent rounded-full"></div>
      <div class="text-sm font-bold tracking-wide">CRYPTO·DEGEN</div>
      <div class="text-[10px] text-neutral-500 num ml-2" id="lastUpdate">--:--:--</div>
    </div>
    <div class="hidden sm:flex items-center gap-4 text-[10px] num text-neutral-400">
      <div>TOP <span class="text-neutral-100 font-semibold">15</span></div>
      <div>REFRESH <span class="text-neutral-100 font-semibold">30s</span></div>
      <div class="flex items-center gap-1">
        <span class="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse"></span>
        <span class="text-green-400">LIVE</span>
      </div>
    </div>
    <button id="refreshBtn" class="text-xs text-neutral-400 hover:text-neutral-100 num">↻</button>
  </div>
</header>

<main class="max-w-7xl mx-auto px-5 py-4">
  <!-- Ticker strip with key stats -->
  <div class="grid grid-cols-2 sm:grid-cols-4 gap-2 mb-4" id="ticker">
    <!-- aggregate stats injected here -->
  </div>
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3" id="grid">
    <!-- 15 cards injected here -->
  </div>
</main>

<footer class="max-w-7xl mx-auto px-5 py-3 text-[10px] text-neutral-500 flex items-center justify-between num">
  <div>COINGECKO · TOP 15 BY MARKET CAP · NOT FINANCIAL ADVICE</div>
  <div id="footerTime">--:--:--</div>
</footer>

<script>
const COINS = 15;
let timer = null;

async function fetchTop() {
  const url = `https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=${COINS}&page=1&sparkline=true&price_change_percentage=24h`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('rate limited: ' + r.status);
  return await r.json();
}
async function fetchGlobal() {
  try {
    const r = await fetch('https://api.coingecko.com/api/v3/global');
    if (!r.ok) return null;
    const j = await r.json();
    return j.data;
  } catch { return null; }
}

function fmtPrice(n) {
  if (n >= 1000) return n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  if (n >= 1) return n.toFixed(2);
  if (n >= 0.01) return n.toFixed(4);
  return n.toPrecision(3);
}
function fmtBig(n) {
  if (n >= 1e12) return '$' + (n/1e12).toFixed(2) + 'T';
  if (n >= 1e9)  return '$' + (n/1e9).toFixed(2) + 'B';
  if (n >= 1e6)  return '$' + (n/1e6).toFixed(2) + 'M';
  return '$' + n.toLocaleString();
}
function sparkPath(arr, w=120, h=36) {
  if (!arr || arr.length < 2) return '';
  const min = Math.min(...arr), max = Math.max(...arr);
  const range = max - min || 1;
  const step = w / (arr.length - 1);
  return arr.map((v, i) => {
    const x = i * step;
    const y = h - ((v - min) / range) * h;
    return (i === 0 ? 'M' : 'L') + x.toFixed(1) + ',' + y.toFixed(1);
  }).join(' ');
}
function sparkArea(arr, w=120, h=36) {
  const line = sparkPath(arr, w, h);
  if (!line) return '';
  return line + ` L ${w},${h} L 0,${h} Z`;
}

function renderTicker(global) {
  if (!global) return;
  const ticker = document.getElementById('ticker');
  const totMcap = global.total_market_cap?.usd || 0;
  const totVol = global.total_volume?.usd || 0;
  const mcapCh = global.market_cap_change_percentage_24h_usd || 0;
  const btcDom = global.market_cap_percentage?.btc || 0;
  const up = mcapCh >= 0;
  ticker.innerHTML = `
    <div class="card rounded-lg p-3">
      <div class="text-[10px] text-neutral-500 num mb-1">TOTAL MCAP</div>
      <div class="num text-sm font-bold">${fmtBig(totMcap)}</div>
      <div class="num text-[11px] ${up ? 'up' : 'down'}">${up ? '+' : ''}${mcapCh.toFixed(2)}%</div>
    </div>
    <div class="card rounded-lg p-3">
      <div class="text-[10px] text-neutral-500 num mb-1">24H VOLUME</div>
      <div class="num text-sm font-bold">${fmtBig(totVol)}</div>
    </div>
    <div class="card rounded-lg p-3">
      <div class="text-[10px] text-neutral-500 num mb-1">BTC DOMINANCE</div>
      <div class="num text-sm font-bold">${btcDom.toFixed(1)}%</div>
      <div class="bar bg-neutral-800 mt-1.5 overflow-hidden">
        <div class="bar accent" style="width:${Math.min(btcDom, 100)}%"></div>
      </div>
    </div>
    <div class="card rounded-lg p-3">
      <div class="text-[10px] text-neutral-500 num mb-1">ACTIVE CRYPTOS</div>
      <div class="num text-sm font-bold">${(global.active_cryptocurrencies || 0).toLocaleString()}</div>
    </div>
  `;
}

function render(coins) {
  const grid = document.getElementById('grid');
  grid.innerHTML = coins.map(c => {
    const change = c.price_change_percentage_24h ?? 0;
    const up = change >= 0;
    const sparkArr = c.sparkline_in_7d?.price || [];
    const color = up ? '#00d68f' : '#ff3b69';
    return `
      <div class="card rounded-lg p-3.5 flex flex-col gap-2.5">
        <div class="flex items-center gap-2">
          <img src="${c.image}" alt="" class="w-6 h-6 rounded-full">
          <div class="flex-1 min-w-0">
            <div class="text-sm font-bold text-neutral-50">${c.symbol.toUpperCase()}</div>
            <div class="text-[10px] text-neutral-500 truncate">${c.name}</div>
          </div>
          <div class="text-[10px] text-neutral-500 num">#${c.market_cap_rank}</div>
        </div>
        <div class="flex items-end justify-between">
          <div class="num text-lg font-bold ${up ? 'glow-up' : 'glow-down'}" style="color:${color}">$${fmtPrice(c.current_price)}</div>
          <div class="num text-xs font-semibold ${up ? 'up' : 'down'}">${up ? '+' : ''}${change.toFixed(2)}%</div>
        </div>
        <svg width="100%" height="36" viewBox="0 0 120 36" preserveAspectRatio="none" class="-mx-1">
          <defs>
            <linearGradient id="g${c.id}" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="${color}" stop-opacity="0.3"/>
              <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
            </linearGradient>
          </defs>
          <path d="${sparkArea(sparkArr)}" fill="url(#g${c.id})" />
          <path d="${sparkPath(sparkArr)}" class="spark" stroke="${color}" />
        </svg>
        <div class="grid grid-cols-2 gap-1 text-[10px] num pt-1 border-t border-neutral-800/50">
          <div class="text-neutral-500">MCAP<br><span class="text-neutral-200">${fmtBig(c.market_cap)}</span></div>
          <div class="text-neutral-500 text-right">VOL 24H<br><span class="text-neutral-200">${fmtBig(c.total_volume)}</span></div>
        </div>
      </div>
    `;
  }).join('');

  const now = new Date();
  const stamp = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
  document.getElementById('lastUpdate').textContent = stamp;
  document.getElementById('footerTime').textContent = stamp;
}

function renderSkel() {
  const grid = document.getElementById('grid');
  grid.innerHTML = Array.from({length: COINS}, () => `
    <div class="card rounded-lg p-3.5 flex flex-col gap-2">
      <div class="skel h-6 w-32 rounded"></div>
      <div class="skel h-5 w-20 rounded"></div>
      <div class="skel h-9 w-full rounded"></div>
    </div>
  `).join('');
}

async function tick() {
  try {
    const [coins, global] = await Promise.all([fetchTop(), fetchGlobal()]);
    render(coins);
    renderTicker(global);
  } catch (e) {
    console.error(e);
    document.getElementById('lastUpdate').textContent = 'ERROR';
  }
}

document.getElementById('refreshBtn').addEventListener('click', tick);
renderSkel();
tick();
timer = setInterval(tick, 30000);
</script>
</body>
</html>
