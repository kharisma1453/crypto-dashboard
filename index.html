<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Crypto Dashboard — Dark Trader</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0a0a0a;
  }
  .mono { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }
  .num { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-variant-numeric: tabular-nums; }
  .up { color: #22c55e; }
  .down { color: #ef4444; }
  .skel { background: #1a1a1a; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .5; } }
  .spark { stroke-width: 1.5; fill: none; }
  .card { background: #111; border: 1px solid #1f1f1f; transition: border-color .15s ease, background .15s ease; }
  .card:hover { border-color: #333; background: #131313; }
  .divider { border-color: #1f1f1f; }
</style>
</head>
<body class="text-neutral-200 min-h-screen">
<header class="border-b divider">
  <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
      <div class="text-sm font-medium tracking-tight text-neutral-100">CRYPTO · TOP 15</div>
      <div class="text-xs text-neutral-500 num ml-2" id="lastUpdate">—</div>
    </div>
    <div class="flex items-center gap-3">
      <div class="text-xs text-neutral-500 num">30s</div>
      <button id="refreshBtn" class="text-xs text-neutral-400 hover:text-neutral-100 num">REFRESH</button>
    </div>
  </div>
</header>

<main class="max-w-7xl mx-auto px-6 py-6">
  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-3" id="grid">
    <!-- 15 cards injected here -->
  </div>
</main>

<footer class="max-w-7xl mx-auto px-6 py-4 text-xs text-neutral-600 flex items-center justify-between">
  <div class="num">COINGECKO · TOP 15 BY MARKET CAP</div>
  <div class="num" id="footerTime"></div>
</footer>

<script>
const COINS = 15;
let timer = null;

async function fetchTop() {
  const url = `https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=${COINS}&page=1&sparkline=true&price_change_percentage=24h`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('rate limited or network error: ' + r.status);
  return await r.json();
}

function fmtPrice(n) {
  if (n >= 1000) return n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  if (n >= 1) return n.toFixed(2);
  if (n >= 0.01) return n.toFixed(4);
  return n.toPrecision(3);
}
function fmtBig(n) {
  if (n >= 1e12) return '$' + (n/1e12).toFixed(2) + 'T';
  if (n >= 1e9)  return '$' + (n/1e9).toFixed(2) + 'B';
  if (n >= 1e6)  return '$' + (n/1e6).toFixed(2) + 'M';
  return '$' + n.toLocaleString();
}
function sparkPath(arr, w=100, h=28) {
  if (!arr || arr.length < 2) return '';
  const min = Math.min(...arr), max = Math.max(...arr);
  const range = max - min || 1;
  const step = w / (arr.length - 1);
  return arr.map((v, i) => {
    const x = i * step;
    const y = h - ((v - min) / range) * h;
    return (i === 0 ? 'M' : 'L') + x.toFixed(1) + ',' + y.toFixed(1);
  }).join(' ');
}

function render(coins) {
  const grid = document.getElementById('grid');
  grid.innerHTML = coins.map(c => {
    const change = c.price_change_percentage_24h ?? 0;
    const up = change >= 0;
    const sparkArr = c.sparkline_in_7d?.price || [];
    return `
      <div class="card rounded-md p-3.5 flex flex-col gap-2">
        <div class="flex items-center gap-2">
          <img src="${c.image}" alt="" class="w-5 h-5 rounded-full">
          <div class="text-sm font-semibold text-neutral-100">${c.symbol.toUpperCase()}</div>
          <div class="text-[10px] text-neutral-500 num ml-auto">RANK ${c.market_cap_rank}</div>
        </div>
        <div class="num text-lg font-semibold text-neutral-50">$${fmtPrice(c.current_price)}</div>
        <div class="flex items-center justify-between">
          <div class="num text-xs ${up ? 'up' : 'down'}">${up ? '▲' : '▼'} ${up ? '+' : ''}${change.toFixed(2)}%</div>
          <svg width="100" height="28" viewBox="0 0 100 28" class="${up ? '' : ''}">
            <path d="${sparkPath(sparkArr)}" class="spark" stroke="${up ? '#22c55e' : '#ef4444'}" />
          </svg>
        </div>
        <div class="border-t divider pt-2 mt-1 flex justify-between text-[11px] text-neutral-500 num">
          <span>MCAP</span>
          <span class="text-neutral-300">${fmtBig(c.market_cap)}</span>
        </div>
        <div class="flex justify-between text-[11px] text-neutral-500 num">
          <span>VOL 24H</span>
          <span class="text-neutral-300">${fmtBig(c.total_volume)}</span>
        </div>
      </div>
    `;
  }).join('');

  const now = new Date();
  const stamp = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
  document.getElementById('lastUpdate').textContent = stamp;
  document.getElementById('footerTime').textContent = stamp;
}

function renderSkel() {
  const grid = document.getElementById('grid');
  grid.innerHTML = Array.from({length: COINS}, () => `
    <div class="card rounded-md p-3.5 flex flex-col gap-2">
      <div class="skel h-5 w-20 rounded"></div>
      <div class="skel h-6 w-24 rounded"></div>
      <div class="skel h-3 w-16 rounded"></div>
    </div>
  `).join('');
}

async function tick() {
  try {
    const coins = await fetchTop();
    render(coins);
  } catch (e) {
    console.error(e);
    document.getElementById('lastUpdate').textContent = 'ERROR';
  }
}

document.getElementById('refreshBtn').addEventListener('click', tick);
renderSkel();
tick();
timer = setInterval(tick, 30000);
</script>
</body>
</html>
